<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>__PANEL_LABEL__ — プレビュー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: system-ui, sans-serif;
      background: linear-gradient(145deg, __PANEL_COLOR__ 0%, #1a1a22 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 8px;
    }
    .badge {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      opacity: 0.75;
      text-transform: uppercase;
    }
    h1 { font-size: 15px; font-weight: 700; }
    .hint { font-size: 12px; opacity: 0.7; line-height: 1.5; }
    .chat-list {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 6px;
      margin-top: 8px;
    }
    .chat-item {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.4;
      animation: slide-in 0.35s ease-out;
    }
    .chat-item .author { font-weight: 700; margin-right: 6px; }
    .chat-item.sc { border-left: 3px solid #fbbf24; }
    .chat-item.member { border-left: 3px solid #22c55e; }
    .avatar-stage {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 24px;
      padding-bottom: 16px;
    }
    .avatar-slot {
      width: 120px;
      height: 160px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.12);
      border: 2px dashed rgba(255, 255, 255, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      padding: 8px;
    }
  </style>
</head>
<body data-panel="__PANEL_ID__">
  <div class="badge">UI Preview — プレースホルダ</div>
  <h1>__PANEL_LABEL__</h1>
  <p class="hint">Electron なしのレイアウト確認用です。実オーバーレイは本番アプリ起動時に表示されます。</p>
  __PANEL_BODY__
  __PANEL_SCRIPT__
</body>
</html>
