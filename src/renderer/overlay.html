<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; img-src 'self' https://cdn.discordapp.com data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
  <title>Discord RPC Overlay</title>
  <link rel="stylesheet" href="discord-overlay.css">
  <style id="custom-user-css"></style>
</head>
<body>

<div id="user-list"></div>

<script>
const state  = { users: new Map() };
const $list  = document.getElementById('user-list');
const $css   = document.getElementById('custom-user-css');

function handleChannelUpdate(data) {
  state.users.clear();
  $list.innerHTML = '';
  (data.users || []).forEach((u) => {
    state.users.set(u.id, u);
    $list.appendChild(createCard(u));
  });
}

function handleVoiceStateUpdate(data) {
  const { type, user } = data;
  if      (type === 'join')   { state.users.set(user.id, user); addCard(user); }
  else if (type === 'update') { state.users.set(user.id, user); refreshCard(user); }
  else if (type === 'leave')  { state.users.delete(user.id);    removeCard(user.id); }
}

function handleSpeakingUpdate(data) {
  const { userId, speaking } = data;
  const user = state.users.get(userId);
  if (user) user.speaking = speaking;
  const card = document.getElementById(`u-${userId}`);
  if (card) card.classList.toggle('speaking', speaking);
}

function createCard(user) {
  const div = document.createElement('div');
  div.className = `user-card${user.speaking ? ' speaking' : ''}`;
  div.id = `u-${user.id}`;
  div.innerHTML = buildHTML(user);
  return div;
}

function buildHTML(user) {
  const initial = (user.globalName || user.username || '?')[0].toUpperCase();
  const hue     = strToHue(user.id);
  const src     = user.avatar || '';
  const inner   = src
    ? `<img src="${esc(src)}" alt="" onerror="this.style.display='none'">`
    : `<div class="avatar-initial" style="background:hsl(${hue},55%,38%)">${esc(initial)}</div>`;

  return `
    <div class="avatar">${inner}</div>
    <span class="username">${esc(user.globalName || user.username)}</span>
  `;
}

function addCard(user) {
  const card = createCard(user);
  card.classList.add('entering');
  $list.appendChild(card);
  card.addEventListener('animationend', () => card.classList.remove('entering'), { once: true });
}

function refreshCard(user) {
  const card = document.getElementById(`u-${user.id}`);
  if (!card) { addCard(user); return; }
  const wasSpeaking = card.classList.contains('speaking');
  card.innerHTML = buildHTML(user);
  card.className = `user-card${wasSpeaking ? ' speaking' : ''}`;
}

function removeCard(userId) {
  const card = document.getElementById(`u-${userId}`);
  if (!card) return;
  card.classList.add('leaving');
  card.addEventListener('animationend', () => card.remove(), { once: true });
}

function esc(s) {
  if (typeof s !== 'string') return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function strToHue(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = s.charCodeAt(i) + ((h << 5) - h);
  return ((h % 360) + 360) % 360;
}

async function initialize() {
  const api = window.electronAPI;
  if (!api) return;
  api.on('channel-update',     handleChannelUpdate);
  api.on('voice-state-update', handleVoiceStateUpdate);
  api.on('speaking-update',    handleSpeakingUpdate);
  try {
    const s = await api.getSettings();
    if (s.customCssPath) {
      const r = await api.loadCssFile(s.customCssPath);
      if (r.success) $css.textContent = r.css;
    }
  } catch (e) {}
}

initialize();
</script>
</body>
</html>
